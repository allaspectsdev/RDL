version: "3.8"

services:
  rdl:
    build: .
    container_name: rdl-app
    restart: unless-stopped
    ports:
      - "8501:8501"
    volumes:
      - upload_data:/app/uploads
    environment:
      - STREAMLIT_SERVER_MAX_UPLOAD_SIZE=200
    networks:
      - rdl-net
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"

  nginx:
    image: nginx:alpine
    container_name: rdl-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/rdl.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_webroot:/var/www/certbot:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - rdl
    networks:
      - rdl-net

  # Optional: auto-renew SSL certs
  certbot:
    image: certbot/certbot
    container_name: rdl-certbot
    volumes:
      - certbot_webroot:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  upload_data:
  certbot_webroot:
  certbot_certs:

networks:
  rdl-net:
    driver: bridge
