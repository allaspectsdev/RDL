version: "3.8"

services:
  rdl:
    build: .
    container_name: rdl-app
    restart: unless-stopped
    expose:
      - "8501"
    volumes:
      - upload_data:/app/uploads
    environment:
      - STREAMLIT_SERVER_MAX_UPLOAD_SIZE=200
    networks:
      - rdl-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: rdl-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/rdl.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_webroot:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      rdl:
        condition: service_healthy
    networks:
      - rdl-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Optional: auto-renew SSL certs
  certbot:
    image: certbot/certbot
    container_name: rdl-certbot
    volumes:
      - certbot_webroot:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  upload_data:
  certbot_webroot:
  certbot_certs:

networks:
  rdl-net:
    driver: bridge
